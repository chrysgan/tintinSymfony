vich_uploader:
    db_driver: orm

    mappings:
        editeur:
            uri_prefix: /images/editeur
            upload_destination: '%kernel.project_dir%/public/images/editeur'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        personnage:
            uri_prefix: /images/personnage
            upload_destination: '%kernel.project_dir%/public/images/personnage'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        objet:
            uri_prefix: /images/objet
            upload_destination: '%kernel.project_dir%/public/images/objet'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        categorie:
            uri_prefix: /images/categorie
            upload_destination: '%kernel.project_dir%/public/images/categorie'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
